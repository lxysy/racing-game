name: Build, Deploy & Sync

on:
  push:
    branches: [master]

# 赋予 GITHUB_TOKEN 部署 Pages 的权限
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # ─── 部署到 GitHub Pages ──────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages

      # ─── 同步源码到 Gitee ─────────────────────────
      - name: Sync to Gitee
        env:
          GITEE_KEY: ${{ secrets.GITEE_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$GITEE_KEY" > ~/.ssh/gitee_key
          chmod 600 ~/.ssh/gitee_key
          ssh-keyscan -t rsa gitee.com >> ~/.ssh/known_hosts 2>/dev/null
          git remote add gitee git@gitee.com:lx_ysy/racing-game.git
          GIT_SSH_COMMAND="ssh -i ~/.ssh/gitee_key -o StrictHostKeyChecking=no" \
            git push --force gitee master

