name: Build, Deploy & Sync

on:
  push:
    branches: [master]

# 赋予 GITHUB_TOKEN 部署 Pages 的权限
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # ─── 部署到 GitHub Pages ──────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages

      # ─── 同步源码到 Gitee ─────────────────────────
      - name: Sync to Gitee
        env:
          GITEE_KEY: ${{ secrets.GITEE_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$GITEE_KEY" > ~/.ssh/gitee_key
          chmod 600 ~/.ssh/gitee_key

          # 验证密钥
          echo "=== Key fingerprint ==="
          ssh-keygen -lf ~/.ssh/gitee_key 2>&1 || echo "FINGERPRINT FAILED"

          # 添加远程
          git remote add gitee git@gitee.com:lx_ysy/racing-game.git

          # 测试 SSH 连接
          echo "=== SSH test ==="
          GIT_SSH_COMMAND="ssh -i ~/.ssh/gitee_key -o StrictHostKeyChecking=accept-new" \
            ssh -T git@gitee.com 2>&1 || true

          # 推送
          echo "=== Git push ==="
          GIT_SSH_COMMAND="ssh -i ~/.ssh/gitee_key -o StrictHostKeyChecking=accept-new" \
            git push --force gitee master 2>&1
          echo "=== Done ==="

